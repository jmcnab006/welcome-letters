        </td>
    </tr>

    <!-- Footer -->
    <tr>
        <td bgcolor="#f1f1f1"
            style="padding: 15px; text-align: center; font-size: 12px; color: #666;">

            <p style="margin: 0;">
                &copy; {{ sent_date }} {{ company_name }}. All rights reserved.
            </p>

            {% if company_website %}
            <p style="margin: 0;">
                <a href="{{ company_website }}"
                   style="color: #0074cc; text-decoration: none;">
                    {{ company_website }}
                </a>
            </p>
            {% endif %}
            {% if sent_datetime %}
            <p style="margin-top: 2px; color: #888;font-size: 10px">Sent: {{ sent_datetime }}</p>
            {% endif %}
        </td>
    </tr>

</table>

</td>
</tr>
</table>

</body>
</html>
