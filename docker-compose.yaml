# docker-compose.yml
services:
  welcome-letters:
    build: .
    container_name: welcome-letters
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./config/letters.php:/var/www/html/config/letters.php:ro
      - ./config/config.php:/var/www/html/config/config.php:ro
      - ./templates:/var/www/html/templates:ro
    environment:
      TZ: America/Chicago
