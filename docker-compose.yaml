# docker-compose.yml
services:
  welcome-letters:
    build: .
    container_name: welcome-letters
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./config.php:/var/www/html/includes/config.php:ro
      - ./templates:/var/www/html/templates:ro
    environment:
      TZ: America/Chicago
