<VirtualHost *:80>
    ServerName welcome.example.com

    DocumentRoot /var/www/welcome-letters/public

    <Directory /var/www/welcome-letters/public>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /var/www/welcome-letters/app>
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/welcome-letters-error.log
    CustomLog ${APACHE_LOG_DIR}/welcome-letters-access.log combined
</VirtualHost>